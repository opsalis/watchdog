apiVersion: v1
kind: Namespace
metadata:
  name: watchdog
---
apiVersion: v1
kind: Service
metadata:
  name: watchdog-api
  namespace: watchdog
  labels:
    app: watchdog
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 3300
    targetPort: 3300
    protocol: TCP
    name: http
  selector:
    app: watchdog
    component: api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: watchdog-ingress
  namespace: watchdog
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
  - host: api.watchdog.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: watchdog-api
            port:
              number: 3300
  tls:
  - hosts:
    - api.watchdog.example.com
    secretName: watchdog-tls
